# Sync GitHub → Hugging Face Space (Docker).
# HF does not offer "link repo" in Space Settings; use this or manual `git push` (see docs/DEMO.md).
#
# Setup:
# 1. GitHub repo → Settings → Secrets and variables → Actions → New secret `HF_TOKEN`
#    (HF token with write access to the Space)
# 2. If your Space name or HF username differs, edit huggingface_repo_id below.

name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: StevenAu/MIDI-PHOR
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
